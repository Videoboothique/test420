<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Website</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 2rem;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.3), transparent 35%),
        linear-gradient(135deg, #0f172a, #1d4ed8, #ec4899, #f59e0b);
    }

    h1 {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.08em;
      margin: 0;
      font-size: clamp(2.4rem, 9vw, 6rem);
      text-align: center;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    main {
      width: min(100%, 960px);
      margin: 0 auto;
      display: grid;
      justify-items: center;
      gap: 2rem;
    }

    .letter {
      display: inline-block;
      font-weight: 900;
      animation: dance 1s ease-in-out infinite;
    }

    .space {
      width: 0.45em;
    }

    .letter:nth-child(1) { color: #ff4d4d; animation-delay: 0s; }
    .letter:nth-child(2) { color: #ff8a00; animation-delay: 0.08s; }
    .letter:nth-child(3) { color: #ffd93d; animation-delay: 0.16s; }
    .letter:nth-child(4) { color: #6bff95; animation-delay: 0.24s; }
    .letter:nth-child(5) { color: #39c5ff; animation-delay: 0.32s; }
    .letter:nth-child(6) { color: #7b61ff; animation-delay: 0.4s; }
    .letter:nth-child(7) { color: #ff66c4; animation-delay: 0.48s; }
    .letter:nth-child(8) { color: #ff4d4d; animation-delay: 0.56s; }
    .letter:nth-child(9) { color: #ff8a00; animation-delay: 0.64s; }
    .letter:nth-child(10) { color: #ffd93d; animation-delay: 0.72s; }
    .letter:nth-child(11) { color: #6bff95; animation-delay: 0.8s; }
    .letter:nth-child(12) { color: #39c5ff; animation-delay: 0.88s; }
    .letter:nth-child(13) { color: #7b61ff; animation-delay: 0.96s; }
    .letter:nth-child(14) { color: #ff66c4; animation-delay: 1.04s; }
    .letter:nth-child(15) { color: #ff4d4d; animation-delay: 1.12s; }
    .letter:nth-child(16) { color: #ff8a00; animation-delay: 1.2s; }
    .letter:nth-child(17) { color: #ffd93d; animation-delay: 1.28s; }
    .letter:nth-child(18) { color: #6bff95; animation-delay: 1.36s; }
    .letter:nth-child(19) { color: #39c5ff; animation-delay: 1.44s; }
    .letter:nth-child(20) { color: #7b61ff; animation-delay: 1.52s; }
    .letter:nth-child(21) { color: #ff66c4; animation-delay: 1.6s; }
    .letter:nth-child(22) { color: #ff4d4d; animation-delay: 1.68s; }
    .letter:nth-child(23) { color: #ff8a00; animation-delay: 1.76s; }

    .game-card {
      width: min(100%, 420px);
      padding: 1.5rem;
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.45);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(12px);
    }

    .game-card h2 {
      margin: 0 0 0.4rem;
      text-align: center;
      font-size: 1.8rem;
      color: #fff7ed;
    }

    .game-card p {
      margin: 0 0 1rem;
      text-align: center;
      color: #e0f2fe;
    }

    .status {
      min-height: 1.6em;
      margin-bottom: 1rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fef3c7;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
    }

    .cell {
      aspect-ratio: 1;
      border: 0;
      border-radius: 18px;
      font-size: clamp(2rem, 10vw, 3.2rem);
      font-weight: 900;
      color: white;
      cursor: pointer;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.08));
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.12));
    }

    .cell:disabled {
      cursor: default;
      opacity: 0.95;
    }

    .cell.x {
      color: #fde047;
    }

    .cell.o {
      color: #86efac;
    }

    .reset-button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border: 0;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 800;
      color: #0f172a;
      background: linear-gradient(90deg, #facc15, #fb7185, #38bdf8);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .reset-button:hover {
      transform: translateY(-1px);
      filter: saturate(1.1);
    }

    @keyframes dance {
      0%, 100% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      25% {
        transform: translateY(-16px) rotate(-8deg) scale(1.08);
      }
      50% {
        transform: translateY(8px) rotate(8deg) scale(0.96);
      }
      75% {
        transform: translateY(-10px) rotate(-4deg) scale(1.04);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 aria-label="Geef nooit korting">
      <span class="letter">G</span>
      <span class="letter">e</span>
      <span class="letter">e</span>
      <span class="letter">f</span>
      <span class="letter space" aria-hidden="true"></span>
      <span class="letter">n</span>
      <span class="letter">o</span>
      <span class="letter">o</span>
      <span class="letter">i</span>
      <span class="letter">t</span>
      <span class="letter space" aria-hidden="true"></span>
      <span class="letter">k</span>
      <span class="letter">o</span>
      <span class="letter">r</span>
      <span class="letter">t</span>
      <span class="letter">i</span>
      <span class="letter">n</span>
      <span class="letter">g</span>
    </h1>

    <section class="game-card" aria-labelledby="game-title">
      <h2 id="game-title">Boter, kaas en eieren</h2>
      <p>Jij speelt als X. De bot speelt automatisch als O.</p>
      <div class="status" id="status">Speler X is aan de beurt</div>
      <div class="board" id="board">
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
        <button class="cell" type="button" data-cell></button>
      </div>
      <button class="reset-button" id="reset-button" type="button">Opnieuw spelen</button>
    </section>
  </main>

  <script>
    const cells = document.querySelectorAll("[data-cell]");
    const statusText = document.getElementById("status");
    const resetButton = document.getElementById("reset-button");
    const winningLines = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    let gameActive = true;
    let botThinking = false;

    function updateStatus(message) {
      statusText.textContent = message;
    }

    function checkWinner() {
      return winningLines.find(([a, b, c]) => {
        return (
          cells[a].textContent &&
          cells[a].textContent === cells[b].textContent &&
          cells[a].textContent === cells[c].textContent
        );
      });
    }

    function finishGame(message, winnerLine) {
      gameActive = false;
      botThinking = false;
      updateStatus(message);

      if (winnerLine) {
        winnerLine.forEach((index) => {
          cells[index].style.outline = "4px solid rgba(255, 255, 255, 0.9)";
        });
      }
    }

    function getEmptyCells() {
      return [...cells].filter((cell) => !cell.textContent);
    }

    function placeMove(cell, player) {
      cell.textContent = player;
      cell.disabled = true;
      cell.classList.add(player.toLowerCase());

      const winnerLine = checkWinner();
      const isDraw = [...cells].every((boardCell) => boardCell.textContent);

      if (winnerLine) {
        finishGame((player === "X" ? "Jij" : "De bot") + " wint!", winnerLine);
        return true;
      }

      if (isDraw) {
        finishGame("Gelijkspel, probeer nog een keer.");
        return true;
      }

      return false;
    }

    function chooseBotMove() {
      const emptyCells = getEmptyCells();

      if (!emptyCells.length) {
        return null;
      }

      const preferredIndexes = [4, 0, 2, 6, 8, 1, 3, 5, 7];

      for (const line of winningLines) {
        const lineCells = line.map((index) => cells[index].textContent);
        const botCount = lineCells.filter((value) => value === "O").length;
        const emptyIndex = line.find((index) => !cells[index].textContent);

        if (botCount === 2 && emptyIndex !== undefined) {
          return cells[emptyIndex];
        }
      }

      for (const line of winningLines) {
        const lineCells = line.map((index) => cells[index].textContent);
        const playerCount = lineCells.filter((value) => value === "X").length;
        const emptyIndex = line.find((index) => !cells[index].textContent);

        if (playerCount === 2 && emptyIndex !== undefined) {
          return cells[emptyIndex];
        }
      }

      return preferredIndexes
        .map((index) => cells[index])
        .find((cell) => cell && !cell.textContent);
    }

    function runBotTurn() {
      if (!gameActive) {
        return;
      }

      botThinking = true;
      updateStatus("De bot denkt na...");

      window.setTimeout(() => {
        if (!gameActive) {
          return;
        }

        const botCell = chooseBotMove();

        if (!botCell) {
          finishGame("Gelijkspel, probeer nog een keer.");
          return;
        }

        const finished = placeMove(botCell, "O");

        if (!finished) {
          botThinking = false;
          updateStatus("Jij bent aan de beurt");
        }
      }, 450);
    }

    function handleCellClick(event) {
      const cell = event.currentTarget;

      if (!gameActive || botThinking || cell.textContent) {
        return;
      }

      const finished = placeMove(cell, "X");

      if (finished) {
        return;
      }

      runBotTurn();
    }

    function resetGame() {
      gameActive = true;
      botThinking = false;
      updateStatus("Jij bent aan de beurt");

      cells.forEach((cell) => {
        cell.textContent = "";
        cell.disabled = false;
        cell.classList.remove("x", "o");
        cell.style.outline = "";
      });
    }

    cells.forEach((cell) => {
      cell.addEventListener("click", handleCellClick);
    });

    resetButton.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
